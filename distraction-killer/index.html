<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <title>Distraction Killer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🧠 Distraction Killer</h1>

    <div id="timer">25:00</div>

    <div class="buttons">
      <button id="startBtn">Start Focus</button>
      <button id="distractBtn">Разсеях се</button>
      <button id="resetBtn">Reset</button>
    </div>

    <div class="stats">
      <p>Разсейвания: <span id="distractions">0</span></p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
