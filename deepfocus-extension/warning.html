<!DOCTYPE html>
<html>
<head>
  <style>
    body { background: #0b1020; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; margin: 0; }
    .box { text-align: center; border: 2px solid #14b8a6; padding: 40px; border-radius: 20px; }
    h1 { color: #14b8a6; }
    button { background: #14b8a6; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Focus Mode is ON!</h1>
    <p>Go back to work. This site is in your blacklist.</p>
    <button onclick="history.back()">Go Back</button>
  </div>
</body>
</html>
